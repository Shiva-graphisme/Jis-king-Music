<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0800">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jis'king Music">
<title>Jis'king Music</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--deep:#0d0800;--amber:#c8781a;--gold:#e8a830;--fire:#e05c10;--sand:#d4a870;--cream:#f0ddb8;--text:#f5e8cc}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Crimson Pro',serif;display:flex;flex-direction:column;height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(60deg,transparent,transparent 30px,rgba(200,120,26,0.04) 30px,rgba(200,120,26,0.04) 31px),repeating-linear-gradient(-60deg,transparent,transparent 30px,rgba(200,120,26,0.04) 30px,rgba(200,120,26,0.04) 31px);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:10px;border:1px solid rgba(200,120,26,0.2);pointer-events:none;z-index:0}
header{position:relative;z-index:10;text-align:center;padding:28px 20px 16px;flex-shrink:0}
.brand-emblem{width:56px;height:56px;margin:0 auto 12px;position:relative}
.brand-emblem svg{width:100%;height:100%;animation:spinSlow 20s linear infinite}
@keyframes spinSlow{to{transform:rotate(360deg)}}
.brand-emblem .inner{position:absolute;inset:14px;background:var(--amber);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(.9)}}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,var(--gold) 0%,var(--fire) 50%,var(--amber) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-style:italic;font-size:.85rem;color:var(--sand);letter-spacing:.25em;text-transform:uppercase;margin-top:4px;opacity:.8}
.divider{display:flex;align-items:center;gap:10px;max-width:300px;margin:12px auto 0}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.divider-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg)}
.tracks-section{position:relative;z-index:10;flex:1;overflow-y:auto;padding:16px 16px 8px;-webkit-overflow-scrolling:touch}
.section-title{font-family:'Cinzel Decorative',serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--amber),transparent);opacity:.4}
.track-card{background:linear-gradient(135deg,rgba(26,15,0,.9),rgba(40,22,4,.7));border:1px solid rgba(200,120,26,.18);border-left:3px solid transparent;border-radius:3px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden}
.track-card:active{transform:scale(.98)}
.track-card.active{border-left-color:var(--gold);background:linear-gradient(135deg,rgba(200,120,26,.15),rgba(26,15,0,.9))}
.track-num{font-family:'Cinzel Decorative',serif;font-size:.75rem;color:rgba(200,120,26,.5);width:20px;text-align:center;flex-shrink:0}
.track-card.active .track-num{color:var(--gold)}
.track-info{flex:1;min-width:0}
.track-title{font-size:.95rem;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-card.active .track-title{color:var(--gold)}
.track-artist{font-size:.75rem;color:var(--sand);opacity:.7;margin-top:2px;font-style:italic}
.track-play-icon{width:32px;height:32px;border:1px solid rgba(200,120,26,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--amber)}
.track-card.active .track-play-icon{background:var(--gold);color:var(--deep);border-color:var(--gold)}
.player{position:relative;z-index:10;flex-shrink:0;background:linear-gradient(180deg,rgba(13,8,0,0) 0%,rgba(13,8,0,.95) 20%,#0d0800 100%);padding:16px 20px 28px;border-top:1px solid rgba(200,120,26,.2)}
.player-track-info{text-align:center;margin-bottom:12px}
.player-title{font-family:'Cinzel Decorative',serif;font-size:.85rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.05em}
.player-artist{font-size:.75rem;color:var(--sand);font-style:italic;margin-top:2px;opacity:.8}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.time{font-size:.7rem;color:rgba(212,168,112,.6);width:32px;text-align:center}
.progress-bar{flex:1;height:3px;background:rgba(200,120,26,.2);border-radius:2px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--gold));border-radius:2px;width:0%}
.progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:var(--gold);border-radius:50%;left:0%}
.controls{display:flex;align-items:center;justify-content:center;gap:28px}
.ctrl-btn{background:none;border:none;color:var(--sand);cursor:pointer;opacity:.7;padding:6px;display:flex;align-items:center;justify-content:center}
.ctrl-btn:active{transform:scale(.9)}
.ctrl-btn.main{width:52px;height:52px;background:linear-gradient(135deg,var(--amber),var(--fire));border-radius:50%;color:var(--deep);opacity:1;box-shadow:0 4px 16px rgba(200,120,26,.4)}
.eq-wrap{display:flex;align-items:flex-end;gap:2px;height:16px;margin:0 auto 6px;width:fit-content}
.eq-b{width:3px;background:var(--gold);border-radius:1px}
.eq-b:nth-child(1){height:60%;animation:eq .8s ease-in-out infinite}
.eq-b:nth-child(2){height:100%;animation:eq .8s ease-in-out infinite .1s}
.eq-b:nth-child(3){height:40%;animation:eq .8s ease-in-out infinite .2s}
.eq-b:nth-child(4){height:80%;animation:eq .8s ease-in-out infinite .3s}
.eq-b:nth-child(5){height:60%;animation:eq .8s ease-in-out infinite .15s}
@keyframes eq{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.2)}}
.eq-wrap.paused .eq-b{animation-play-state:paused}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:var(--amber);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="brand-emblem">
    <svg viewBox="0 0 80 80" fill="none">
      <polygon points="40,4 76,22 76,58 40,76 4,58 4,22" stroke="#c8781a" stroke-width="1.5" fill="none" opacity=".7"/>
      <polygon points="40,14 66,27 66,53 40,66 14,53 14,27" stroke="#e8a830" stroke-width="1" fill="none" opacity=".5"/>
      <polygon points="40,24 56,32 56,48 40,56 24,48 24,32" stroke="#c8781a" stroke-width="1" fill="none" opacity=".4"/>
    </svg>
    <div class="inner"></div>
  </div>
  <h1>Jis'king Music</h1>
  <p class="subtitle">The Shiva Soundscape</p>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>
</header>
<div class="tracks-section">
  <div class="section-title">Mes Titres</div>
  <div id="track-list"></div>
</div>
<div class="player">
  <div class="eq-wrap paused" id="eq">
    <div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div>
    <div class="eq-b"></div><div class="eq-b"></div>
  </div>
  <div class="player-track-info">
    <div class="player-title" id="p-title">Sélectionne un titre</div>
    <div class="player-artist" id="p-artist">Jis'king le Shiva</div>
  </div>
  <div class="progress-wrap">
    <span class="time" id="t-cur">0:00</span>
    <div class="progress-bar" id="prog-bar">
      <div class="progress-fill" id="prog-fill"></div>
      <div class="progress-thumb" id="prog-thumb"></div>
    </div>
    <span class="time" id="t-dur">0:00</span>
  </div>
  <div class="controls">
    <button class="ctrl-btn" onclick="prev()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn main" id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctrl-btn" onclick="next()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12z"/></svg>
    </button>
  </div>
</div>
<audio id="audio"></audio>
<script>
const TRACKS = [
  { title: "Mandi Orkoum (Remix)", artist: "Jis'king feat. Fonzik", id: "https://shiva-graphisme.github.io/Jis-king-Music/Jisking_feat_Fonzik_-_Mandi_Orkoum_prod_by_Deyen_-_Atypik_Records.mp3" },
  { title: "Hommage aux Étudiants Tchadiens", artist: "Jis'king", id: "https://shiva-graphisme.github.io/Jis-king-Music/Jis_king_hommage_aux_e_tudiants_tchadiens.mp3" },
  { title: "Business", artist: "Jis'king feat. Louzy", id: "https://shiva-graphisme.github.io/Jis-king-Music/jis_king_feat_louzy__business__audio_officiel__nouveaute__2023_128k_.mp3" },
  { title: "Guêin", artist: "Jis'king le Shiva", id: "https://shiva-graphisme.github.io/Jis-king-Music/jis_king_le_Shiva_gue_in.mp3" }
];



function gdrive(id){ return id; }




const audio = document.getElementById('audio');
let current = -1, isPlaying = false;

function fmt(s){ if(isNaN(s)) return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

function renderTracks(){
  document.getElementById('track-list').innerHTML = TRACKS.map((t,i) => `
    <div class="track-card ${i===current?'active':''}" onclick="playTrack(${i})">
      <div class="track-num">${String(i+1).padStart(2,'0')}</div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <div class="track-play-icon">
        ${i===current&&isPlaying
          ?'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
          :'<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'}
      </div>
    </div>`).join('');
}

function playTrack(i){
  current = i;
  audio.src = gdrive(TRACKS[i].id);
  audio.play();
  isPlaying = true;
  document.getElementById('p-title').textContent = TRACKS[i].title;
  document.getElementById('p-artist').textContent = TRACKS[i].artist;
  updateBtn(); renderTracks();
  document.getElementById('eq').classList.remove('paused');
}

function togglePlay(){
  if(current===-1){playTrack(0);return;}
  if(isPlaying){audio.pause();isPlaying=false;document.getElementById('eq').classList.add('paused');}
  else{audio.play();isPlaying=true;document.getElementById('eq').classList.remove('paused');}
  updateBtn(); renderTracks();
}

function updateBtn(){
  document.getElementById('play-icon').innerHTML = isPlaying
    ?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    :'<path d="M8 5v14l11-7z"/>';
}

function prev(){ playTrack(current<=0?TRACKS.length-1:current-1); }
function next(){ playTrack(current>=TRACKS.length-1?0:current+1); }

audio.addEventListener('timeupdate',()=>{
  const p=audio.duration?(audio.currentTime/audio.duration)*100:0;
  document.getElementById('prog-fill').style.width=p+'%';
  document.getElementById('prog-thumb').style.left=p+'%';
  document.getElementById('t-cur').textContent=fmt(audio.currentTime);
  document.getElementById('t-dur').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',()=>next());
audio.addEventListener('pause',()=>{isPlaying=false;updateBtn();renderTracks();document.getElementById('eq').classList.add('paused');});
audio.addEventListener('play',()=>{isPlaying=true;updateBtn();renderTracks();document.getElementById('eq').classList.remove('paused');});
document.getElementById('prog-bar').addEventListener('click',function(e){
  if(!audio.duration)return;
  audio.currentTime=((e.clientX-this.getBoundingClientRect().left)/this.offsetWidth)*audio.duration;
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
renderTracks();
</script>
</body>
</html>
